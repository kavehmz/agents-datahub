apiVersion: apps/v1
kind: Deployment
metadata:
  name: hub
  namespace: datahub-hub
  labels:
    app: datahub-hub
    component: hub
spec:
  replicas: 2
  selector:
    matchLabels:
      app: datahub-hub
      component: hub
  template:
    metadata:
      labels:
        app: datahub-hub
        component: hub
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
      - name: hub
        image: your-registry.io/datahub/hub:v1.0.0
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
        ports:
        - name: grpc
          containerPort: 50051
          protocol: TCP
        - name: http
          containerPort: 8080
          protocol: TCP
        - name: metrics
          containerPort: 9090
          protocol: TCP
        env:
        - name: GRPC_PORT
          value: "50051"
        - name: HTTP_PORT
          value: "8080"
        - name: METRICS_PORT
          value: "9090"
        - name: DATADOG_ENDPOINT
          value: "datadog-agent.monitoring:8125"
        envFrom:
        - secretRef:
            name: hub-tokens
        volumeMounts:
        - name: config
          mountPath: /app/config.yaml
          subPath: hub-config.yaml
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
      volumes:
      - name: config
        configMap:
          name: hub-config